<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Page Agent</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 12px;
      }
      h3 {
        margin-top: 0;
      }
      textarea {
        width: 100%;
        min-height: 90px;
        box-sizing: border-box;
      }
      button {
        margin-top: 8px;
        margin-right: 8px;
      }
      #output {
        white-space: pre-wrap;
        margin-top: 12px;
        padding: 10px;
        background: #f5f5f5;
        border-radius: 8px;
        min-height: 120px;
      }
      #runBtn {
        display: none;
      }
    </style>
  </head>
  <body>
    <h3>Page Agent</h3>
    <textarea id="prompt" placeholder='Try: "find pricing" or "click sign in"'></textarea>
    <br />
    <button id="sendBtn">Send</button>
    <button id="runBtn">Run pending actions</button>
    <div id="output"></div>

    <script src="sidepanel.js"></script>
  </body>
</html>
